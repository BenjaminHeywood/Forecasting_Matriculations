{% extends "dataVis/base.html" %}

{% block content %}
    <h1>Expected Matriculations by Snapshot Date</h1>
    <canvas id="applications-chart"></canvas>
{% endblock content %}

{% block extra_scripts %}
<script>
    const chartData = {{ chart_data_json|safe }};

    new Chart(document.getElementById("applications-chart"), {
        type: "line",
        data: {
            labels: chartData.labels,
            datasets: chartData.datasets.map((dataset) => ({
                ...dataset,
                borderWidth: 2,
                fill: false,
                tension: 0.2
            }))
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: "top"
                }
            },
            scales: {
                x: {
                    title: {
                        display: true,
                        text: "Snapshot Date"
                    }
                },
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: "Expected Matriculations"
                    }
                }
            }
        }
    });
</script>
{% endblock extra_scripts %}
